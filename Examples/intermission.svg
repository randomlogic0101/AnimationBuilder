<svg
  xmlns="http://www.w3.org/2000/svg"
  width="2560"
  height="1600">

  <style>
    text {
      font-family:
        "Fira Code",
        "DejaVu Sans Mono",
        monospace;

      dominant-baseline: middle;
    }

    .scrolling {
      font-size: 120px;
      fill: white;
    }

    .timer {
      font-size: 200px;
      fill: white;
      text-anchor: middle;
    }

    .flash {
      font-size: 140px;
      fill: red;
      text-anchor: middle;
    }

  </style>

  <rect
    width="100%"
    height="100%"
    fill="black" />

  <text
    x="1280"
    y="800"
    fill="white"
    font-size="180"
    text-anchor="middle"

    data-anim="flash"
    data-frequency="1"
    data-loop="true">

    INTERMISSION
  </text>

</svg>
